                    </li>
                    <li>
                        <a href="sessions.html"
                            class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                            Sessions
                        </a>
                    </li>
                    <li>
                        <a href="treatment-plans.html"

                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />

                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"

            </nav>
            <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-slate-200">
                <button onclick="logout()"
                    class="w-full flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-red-50 hover:text-red-600 rounded-xl transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />

                    Logout
                </button>

        <!-- Main Content -->
        <main class="flex-1 ml-64 p-8">
            <!-- Header -->
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h1 class="text-2xl font-bold text-slate-800">Developmental Assessment Questions</h1>
                    <p class="text-slate-500 mt-1">Manage questions for parent developmental history questionnaire</p>
                </div>
                <button onclick="openAddQuestionModal()"
                    class="flex items-center gap-2 px-6 py-3 bg-sage-600 text-white rounded-xl hover:bg-sage-700 transition-colors font-medium">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                    </svg>
                    Add Question
                </button>
            </div>

            <!-- Category Filter -->
            <div class="flex gap-3 mb-6 flex-wrap">
                <button onclick="filterQuestionsByCategory('all')"
                    class="category-filter active px-4 py-2 rounded-xl text-sm font-medium transition-colors"
                    data-category="all">All Questions</button>
                <button onclick="filterQuestionsByCategory('communication')"
                    class="category-filter px-4 py-2 rounded-xl text-sm font-medium transition-colors bg-slate-100 text-slate-600 hover:bg-slate-200"
                    data-category="communication">Communication</button>
                <button onclick="filterQuestionsByCategory('social')"
                    class="category-filter px-4 py-2 rounded-xl text-sm font-medium transition-colors bg-slate-100 text-slate-600 hover:bg-slate-200"
                    data-category="social">Social Skills</button>
                <button onclick="filterQuestionsByCategory('motor')"
                    class="category-filter px-4 py-2 rounded-xl text-sm font-medium transition-colors bg-slate-100 text-slate-600 hover:bg-slate-200"
                    data-category="motor">Motor Skills</button>
                <button onclick="filterQuestionsByCategory('behavior')"
                    class="category-filter px-4 py-2 rounded-xl text-sm font-medium transition-colors bg-slate-100 text-slate-600 hover:bg-slate-200"
                    data-category="behavior">Behavior</button>
                <button onclick="filterQuestionsByCategory('sensory')"
                    class="category-filter px-4 py-2 rounded-xl text-sm font-medium transition-colors bg-slate-100 text-slate-600 hover:bg-slate-200"
                    data-category="sensory">Sensory</button>
            </div>

            <!-- Questions List -->
            <div id="questionsList" class="space-y-4">
                <!-- Questions rendered here -->
            </div>
        </main>
    </div>

    <!-- Add/Edit Question Modal -->
    <div id="questionModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b border-slate-200">
                <h2 id="questionModalTitle" class="text-xl font-semibold text-slate-800">Add New Question</h2>
            </div>
            <form id="questionForm" class="p-6 space-y-4">
                <input type="hidden" id="questionId">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Category</label>
                    <select id="questionCategory" required
                        class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-sage-500 focus:border-sage-500 outline-none transition-all">
                        <option value="">Select Category</option>
                        <option value="communication">Communication</option>
                        <option value="social">Social Skills</option>
                        <option value="motor">Motor Skills</option>
                        <option value="behavior">Behavior</option>
                        <option value="sensory">Sensory</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Question Text</label>
                    <textarea id="questionText" rows="3" required
                        class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-sage-500 focus:border-sage-500 outline-none transition-all resize-none"
                        placeholder="Enter the assessment question..."></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Question Type</label>
                    <select id="questionType" required
                        class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-sage-500 focus:border-sage-500 outline-none transition-all">
                        <option value="yes_no">Yes/No</option>
                        <option value="scale">Scale (1-5)</option>
                        <option value="text">Open Text</option>
                        <option value="multiple_choice">Multiple Choice</option>
                    </select>
                </div>
                <div id="optionsContainer" class="hidden">
                    <label class="block text-sm font-medium text-slate-700 mb-2">Options (one per line)</label>
                    <textarea id="questionOptions" rows="4"
                        class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-sage-500 focus:border-sage-500 outline-none transition-all resize-none"
                        placeholder="Option 1&#10;Option 2&#10;Option 3"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Order</label>
                    <input type="number" id="questionOrder" min="1"
                        class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-sage-500 focus:border-sage-500 outline-none transition-all"
                        placeholder="Display order (e.g., 1, 2, 3...)">
                </div>
                <div class="flex items-center gap-3">
                    <input type="checkbox" id="questionRequired"
                        class="w-5 h-5 rounded border-slate-300 text-sage-600 focus:ring-sage-500">
                    <label for="questionRequired" class="text-sm font-medium text-slate-700">Required question</label>
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeQuestionModal()"
                        class="flex-1 px-6 py-3 border border-slate-200 text-slate-700 rounded-xl hover:bg-slate-50 transition-colors font-medium">Cancel</button>
                    <button type="submit"
                        class="flex-1 px-6 py-3 bg-sage-600 text-white rounded-xl hover:bg-sage-700 transition-colors font-medium">Save
                        Question</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/mock-data.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/therapist-dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            //checkAuth('therapist');
            renderAssessmentQuestionsPage();

            // Toggle options field visibility
            document.getElementById('questionType').addEventListener('change', function () {
                const optionsContainer = document.getElementById('optionsContainer');
                optionsContainer.classList.toggle('hidden', this.value !== 'multiple_choice');
            });
        });
    </script>
</body>

</html>
