{% load i18n %}
<style>
  .sidebar-link.active {
    background-color: #f6f7f6;
    color: #5d7d6e;
  }
</style>
<aside class="sidebar w-64 bg-white h-screen fixed start-0 top-0 shadow-lg z-40 rtl:shadow-[-10px_0_15px_-3px_rgba(0,0,0,0.1)]">
  <div class="p-6 border-b border-gray-100">
    <a href="{% url 'core:index' %}" class="flex items-center gap-2">
      <div class="w-10 h-10 bg-sage-400 rounded-lg flex items-center justify-center">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
        </svg>
      </div>
      <span class="text-xl font-semibold text-gray-800">{% trans "Namaa" %}</span>
    </a>
    <span class="inline-block mt-2 px-2 py-1 bg-sage-100 text-sage-700 text-xs font-medium rounded">{% trans "Therapist" %}</span>
  </div>
  
  <nav class="p-4">
    <ul class="space-y-2">
      <li>
        <a href="{% url 'core:therapist_dashboard' %}" class="sidebar-link {% if request.resolver_match.url_name == 'therapist_dashboard' %}active{% endif %} flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 font-medium hover:bg-sage-50">
          <svg class="w-5 h-5 rtl:scale-x-[-1]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
          {% trans "Dashboard" %}
        </a>
      </li>
      <li>
        <a href="{% url 'core:therapist_profile' %}" class="sidebar-link {% if request.resolver_match.url_name == 'therapist_profile' %}active{% endif %} flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 font-medium hover:bg-sage-50">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
          {% trans "My Profile" %}
        </a>
      </li>
      <li>
        <a href="{% url 'core:therapist_children' %}" class="sidebar-link {% if request.resolver_match.url_name == 'therapist_children' %}active{% endif %} flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 font-medium hover:bg-sage-50">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
          {% trans "Children" %}
        </a>
      </li>
      <li>
        <a href="{% url 'core:therapist_sessions' %}" class="sidebar-link {% if request.resolver_match.url_name == 'therapist_sessions' %}active{% endif %} flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 font-medium hover:bg-sage-50">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
          {% trans "Sessions" %}
        </a>
      </li>
      <li>
        <a href="{% url 'core:therapist_treatment_plans' %}" class="sidebar-link {% if request.resolver_match.url_name == 'therapist_treatment_plans' or request.resolver_match.url_name == 'therapist_treatment_plan_detail' %}active{% endif %} flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 font-medium hover:bg-sage-50">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
          {% trans "Treatment Plans" %}
        </a>
      </li>
    </ul>
  </nav>
  
  <div class="absolute bottom-0 start-0 end-0 p-4 border-t border-gray-100">
    <form action="{% url 'core:logout' %}" method="post">
      {% csrf_token %}
      <button type="submit" class="w-full flex items-center gap-3 px-4 py-3 text-red-500 hover:bg-red-50 rounded-lg transition-colors">
        <svg class="w-5 h-5 rtl:scale-x-[-1]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
        {% trans "Logout" %}
      </button>
    </form>
  </div>
</aside>
